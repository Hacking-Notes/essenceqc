    <p>EssenceQC est un comparateur gratuit de prix d'essence en temps réel pour le Québec. Consultez les prix de plus de 2400 stations-service partout dans la province.</p>
    <h2>Fonctionnalités</h2>
    <ul>
      <li>Prix en temps réel de toutes les stations du Québec (Régulier, Super, Diesel)</li>
      <li>Recherche par ville ou par géolocalisation</li>
      <li>Tri par prix ou par distance</li>
      <li>Filtre par marque (Costco, Petro-Canada, Shell, Ultramar, etc.)</li>
      <li>Calculateur de coût de plein d'essence</li>
      <li>Comparaison par région et par marque</li>
      <li>Mode clair et sombre</li>
    </ul>
    <h2>Source des données</h2>
    <p>Les données proviennent de la <a href="https://www.regie-energie.qc.ca">Régie de l'énergie du Québec</a> via le portail <a href="https://regieessencequebec.ca">regieessencequebec.ca</a>. Conformément à la Loi 69, tous les détaillants d'essence au Québec doivent déclarer leurs prix en temps réel depuis le 1er avril 2026.</p>
    <h2>Villes populaires</h2>
    <p>Montréal, Québec, Laval, Gatineau, Longueuil, Sherbrooke, Saguenay, Trois-Rivières, Lévis, Terrebonne, Drummondville, Saint-Jérôme, Granby, Rimouski, Joliette, Val-d'Or, Rouyn-Noranda, Sept-Îles, Alma, Magog</p>
    <p>Activez JavaScript pour utiliser l'application.</p>

function MiniMap({lat,lon,color,theme}){

        touchZoom:false,boxZoom:false,keyboard:false,tap:false,

        :"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
      L.tileLayer(tileUrl,{maxZoom:18}).addTo(m);
      const icon=L.divIcon({
        className:"",
        html:'<div style="width:16px;height:16px;border-radius:50%;background:'+color+';border:2.5px solid '+(theme==="dark"?"#0A0A0C":"#fff")+';box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',
        iconSize:[16,16],iconAnchor:[8,8]
      });
      L.marker([lat,lon],{icon}).addTo(m);
      setTimeout(()=>{try{m.invalidateSize()}catch(e){}},120);
      setTimeout(()=>{try{m.invalidateSize()}catch(e){}},400);
    }catch(e){console.error(e)}

  },[lat,lon,color,theme]);

}

</div>

                {lr&&<span style={{fontSize:10,color:"var(--t4)",fontFamily:"var(--mono)",padding:"3px 8px",background:"var(--card)",borderRadius:6,border:"1px solid var(--border)"}}>{fmtAgo(lr)}</span>}
                <button className="theme-btn" onClick={toggleTheme} title={theme==="dark"?"Mode clair":"Mode sombre"}>
                  {theme==="dark"?<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                  :<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>}
                </button>
                <button onClick={()=>fetchD(true)} title="Rafraîchir (R)" style={{width:30,height:30,borderRadius:8,border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t3)",transition:"all .15s"}}>
                  {ld?<div className="sp"/>:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115.38-6.36L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15.38 6.36L3 16"/></svg>}
                </button>
                {!ld&&st.length>0&&<div className="live"/>}
              </div>
            </div>
          </header>
          <main className="mx" style={{flex:1,paddingTop:16,paddingBottom:50}}>
            {/* Search */}
            <div className="en d1" ref={sRef} style={{position:"relative",marginBottom:10,zIndex:30}}>
              <div className="si">
                <svg className="sico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
                <input value={q} onChange={e=>onInput(e.target.value)} placeholder="Rechercher une ville..." onFocus={()=>{if(q)doSearch(q)}}/>
                {q&&<button className="clr" onClick={()=>{setQ("");setSug([])}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>}
              </div>
              {sug.length>0&&<div className="dd">{sug.map((c,i)=>(<button key={i} onClick={()=>pickCity(c)}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--t4)" strokeWidth="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span style={{fontWeight:500}}>{c.name}</span><span className="ck">{c.count}</span></button>))}</div>}
            </div>
            {/* Location + tank */}
            <div className="en d2" style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <button className={"loc-btn "+(ctr?.label==="Ma position"?"active":"inactive")} onClick={useMe}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                {gs==="loading"?"...":"Ma position"}
              </button>
              {ctr&&ctr.label!=="Ma position"&&(
                <div style={{height:36,padding:"0 12px",borderRadius:9,display:"flex",alignItems:"center",gap:4,background:"var(--blg)",border:"1.5px solid rgba(59,130,246,.15)",fontSize:12,fontWeight:600,color:"var(--bl)",animation:"popIn .3s ease"}}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span style={{maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ctr.label}</span>
                </div>
              )}
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:10,color:"var(--t4)"}}>Réservoir:</span>
                <select value={tank} onChange={e=>setTank(Number(e.target.value))} style={{background:"var(--card)",color:"var(--t2)",border:"1px solid var(--border)",borderRadius:7,padding:"4px 8px",fontSize:12,fontFamily:"var(--mono)",outline:"none",cursor:"pointer"}}>
                  {[30,35,40,45,50,55,60,65,70,80,90,100].map(v=><option key={v} value={v}>{v}L</option>)}
                </select>
              </div>
            </div>
            {/* Fuel + Sort */}
            <div className="en d3" style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",gap:4}}>
                <button className={"chip"+(sort==="price"?" on":"")} onClick={()=>setSort("price")} style={{height:32,fontSize:11,padding:"0 10px"}}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2v20M7 7l5-5 5 5"/></svg>Prix
                </button>
                <button className={"chip"+(sort==="dist"?" on":"")} onClick={()=>setSort("dist")} style={{height:32,fontSize:11,padding:"0 10px"}}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/></svg>Dist.
                </button>
              </div>
              <div style={{marginLeft:"auto",display:"flex",gap:5}}>
                {["regular","super","diesel"].map((f,i)=>(<button key={f} className={"chip"+(fuel===f?" on":"")} onClick={()=>setFuel(f)} title={`Raccourci: ${i+1}`}>{FL[f]}</button>))}
              </div>
            </div>
            {/* Radius */}
            <div className="en d5" style={{marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:10,fontWeight:700,color:"var(--t4)",letterSpacing:1,textTransform:"uppercase"}}>Rayon</span>
                <span style={{fontFamily:"var(--mono)",fontSize:16,fontWeight:500,fontVariantNumeric:"tabular-nums"}}>{rad}<span style={{fontSize:10,color:"var(--t4)",marginLeft:2}}>km</span></span>
              </div>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",top:0,left:0,height:4,borderRadius:2,width:((rad-1)/99*100)+"%",background:"linear-gradient(90deg,var(--blue),var(--bl))",zIndex:1,pointerEvents:"none",transition:"width .03s"}}/>
                <input type="range" min={1} max={100} step={1} value={rad} onChange={e=>setRad(Number(e.target.value))}/>
              </div>
            </div>
            {/* Empty state */}
            {!ctr&&(
              <div className="en d6" style={{textAlign:"center",padding:"40px 20px",background:"var(--card)",borderRadius:16,border:"1px solid var(--border)"}}>
                {gs==="loading"&&!geoTimeout?(
                  <>
                    <div style={{margin:"0 auto 20px",width:180}}>
                      <svg width="180" height="36" viewBox="0 0 180 36" fill="none" style={{animation:"float 2.5s ease-in-out infinite"}}>
                        <line x1="0" y1="28" x2="180" y2="28" stroke="var(--border)" strokeWidth="1.5"/>
                        <line x1="0" y1="28" x2="180" y2="28" stroke="var(--t5)" strokeWidth=".5" strokeDasharray="5 4" style={{animation:"dash .6s linear infinite"}}/>
                        <g style={{animation:"drive 3s ease-in-out infinite"}}>
                          <rect x="2" y="18" width="16" height="7" rx="1.5" fill="var(--t5)"/>
                          <path d="M5 18l1.5-4h7l1.5 4" fill="var(--t4)"/>
                          <circle cx="6" cy="26" r="1.8" fill="var(--bg)" stroke="var(--t5)" strokeWidth=".5"/>
                          <circle cx="15" cy="26" r="1.8" fill="var(--bg)" stroke="var(--t5)" strokeWidth=".5"/>
                        </g>
                      </svg>
                    </div>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Recherche de votre position...</div>
                    <div style={{fontSize:12,color:"var(--t4)"}}>Veuillez autoriser la localisation dans votre navigateur.</div>
                  </>
                ):(
                  <>
                    <div style={{animation:"float 3s ease-in-out infinite",marginBottom:14}}>
                      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--t5)" strokeWidth="1.2"><circle cx="12" cy="12" r="10"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                    <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>
                      {gs==="denied"?"Localisation bloquée":geoTimeout?"La localisation prend trop de temps":"Choisissez un emplacement"}
                    </div>
                    <div style={{fontSize:13,color:"var(--t3)",lineHeight:1.5,maxWidth:320,margin:"0 auto 14px"}}>
                      {gs==="denied"
                        ?"Votre navigateur bloque l'accès. Recherchez une ville ci-dessus ou vérifiez les permissions."
                        :geoTimeout
                          ?"Recherchez une ville ci-dessus ou réessayez la localisation."
                          :"Utilisez le bouton Ma position ou recherchez une ville ci-dessus."}
                    </div>
                    {(gs==="denied"||geoTimeout)&&(
                      <button onClick={useMe} style={{padding:"10px 24px",borderRadius:10,background:"var(--blg)",border:"1.5px solid rgba(59,130,246,.2)",color:"var(--bl)",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>
                        Réessayer la localisation
                      </button>
                    )}
                  </>
                )}
              </div>
            )}
            {/* Results */}
            {ctr&&(
              <div key={key}>
                {/* View toggle */}
                <div className="en d6" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,gap:8}}>
                  <div className="view-toggle">
                    {[{k:"list",l:"Liste",ico:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>},

                      {k:"map",l:"Carte",ico:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>},
                      {k:"regions",l:"Régions",ico:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>},
                      {k:"brands",l:"Marques",ico:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>}
                    ].map(v=>(<button key={v.k} className={view===v.k?"on":""} onClick={()=>setView(v.k)} style={{display:"flex",alignItems:"center",gap:4}} title={v.l}>{v.ico}<span className="vt-label">{v.l}</span></button>))}
                  </div>
                  {brandsInRange.length>1&&(
                    <select className="brand-select" value={brandFilter||""} onChange={e=>setBrandFilter(e.target.value||null)}
                      style={{height:36,padding:"0 28px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--card)",color:brandFilter?"var(--bl)":"var(--t3)",fontSize:12,fontWeight:600,fontFamily:"var(--sans)",outline:"none",cursor:"pointer",appearance:"none",WebkitAppearance:"none",backgroundImage:`url("data:image/svg+xml,${encodeURIComponent('<svg width=\"10\" height=\"6\" viewBox=\"0 0 10 6\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M1 1l4 4 4-4\" stroke=\"%236E6E78\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></svg>')}")`,backgroundRepeat:"no-repeat",backgroundPosition:"right 10px center",transition:"all .15s",maxWidth:160,textAlign:"center",textAlignLast:"center"}}>
                      <option value="">Toutes les marques</option>
                      {brandsInRange.filter(b=>b.brand!=="Aucun"&&b.brand!=="Autre").map(b=>(
                        <option key={b.brand} value={b.brand}>{b.brand} ({b.count})</option>
                      ))}
                    </select>
                  )}
                </div>
                {/* Hero */}
                {filt.length>0&&view==="list"&&(
                  <div className="hero en d7" style={{marginBottom:14,position:"relative"}}>
                    <div style={{fontSize:10,color:"var(--t3)",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700,marginBottom:8,fontFamily:"var(--mono)"}}>Meilleur prix</div>
                    <div style={{fontFamily:"var(--mono)",fontSize:38,fontWeight:600,color:"var(--grn)",lineHeight:1,letterSpacing:-2,fontVariantNumeric:"tabular-nums",animation:"countUp .5s ease"}}>
                      {fmtP(ch)}<span style={{fontSize:15,color:"var(--t3)",fontWeight:400}}> ¢/L</span>
                    </div>
                    <div style={{fontSize:13,color:"var(--t2)",marginTop:6}}>
                      {filt[0].brand!=="Aucun"?filt[0].brand:filt[0].name}{isM(filt[0].brand)&&" (membre)"} · {filt[0].dist.toFixed(1)} km
                    </div>
                    <div style={{fontSize:13,color:"var(--t2)",marginTop:2,fontFamily:"var(--mono)"}}>
                      Plein de {tank}L: <span style={{color:"var(--t1)",fontWeight:600}}>{(ch*tank/100).toFixed(2)}$</span>
                    </div>
                    {sp>0&&(
                      <div style={{marginTop:12,display:"inline-flex",alignItems:"center",gap:6,background:"var(--grng)",border:"1px solid rgba(34,197,94,.1)",borderRadius:8,padding:"5px 14px",animation:"popIn .4s ease .2s both"}}>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--grn)" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
                        <span style={{fontSize:12,fontWeight:600,color:"var(--grn)"}}>Économie: {(sp*tank/100).toFixed(2)}$ sur {tank}L</span>
                      </div>
                    )}
                  </div>
                )}
                {/* Stats */}
                {view==="list"&&(
                  <div className="en d8" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:12}}>
                    {[{l:"Stations",v:String(filt.length),c:"var(--t1)"},{l:"Meilleur",v:ch?fmtP(ch):"--",c:"var(--grn)"},{l:"Moyenne",v:avg?fmtP(avg):"--",c:"var(--t2)"}]
                    .map((s,i)=>(<div key={i} className="stat"><div className="sl">{s.l}</div><div className="sv" style={{color:s.c}}>{s.v}</div></div>))}
                  </div>
                )}

                {/* MAP VIEW */}
                {view==="map"&&(
                  <div className="en d7">
                    <div className="map-box" ref={mapBoxRef}/>
                    <div style={{display:"flex",justifyContent:"center",gap:8,padding:"6px 0",flexWrap:"wrap"}}>
                      <button className="map-legend-btn" onClick={()=>flyToPrice("min")} title="Aller au moins cher">
                        <span className="ldot" style={{background:"#22C55E"}}/>Moins cher
                      </button>
                      <button className="map-legend-btn" onClick={()=>flyToPrice("median")} title="Aller au prix median">
                        <span className="ldot" style={{background:"#FBBF24"}}/>Moyen
                      </button>
                      <button className="map-legend-btn" onClick={()=>flyToPrice("max")} title="Aller au plus cher">
                        <span className="ldot" style={{background:"#EF4444"}}/>Plus cher
                      </button>
                    </div>
                    <div style={{textAlign:"center",fontSize:11,color:"var(--t5)",marginTop:4}}>{filt.length} stations affichées · cliquez la légende pour zoomer</div>
                  </div>
                )}
                {/* REGIONS VIEW */}
                {view==="regions"&&(
                  <div className="tab-section en d7">
                    <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)"}}>
                      <div style={{fontSize:14,fontWeight:600}}>Prix moyen par région</div>
                      <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>{FL[fuel]} · {regions.length} régions</div>
                    </div>
                    <div style={{maxHeight:400,overflowY:"auto"}}>
                      {regions.map((r,i)=>(
                        <div key={r.name} className="tab-row" style={{padding:"10px 16px"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:500}}>{i===0?"🏆 ":""}{r.name}</div>
                            <div style={{fontSize:11,color:"var(--t4)",marginTop:1}}>{r.count} stations</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:600,color:i===0?"var(--grn)":"var(--t1)"}}>{fmtP(r.avg)} ¢</div>
                            <div style={{fontSize:10,color:"var(--t4)",fontFamily:"var(--mono)"}}>min: {fmtP(r.min)}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {/* BRANDS VIEW */}
                {view==="brands"&&(
                  <div className="tab-section en d7">
                    <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)"}}>
                      <div style={{fontSize:14,fontWeight:600}}>Classement par marque</div>
                      <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>{FL[fuel]} · dans {rad} km · plein de {tank}L</div>
                    </div>
                    <div style={{maxHeight:400,overflowY:"auto"}}>
                      {brandRanking.filter(r=>r.brand!=="Aucun"&&r.brand!=="Autre").map((r,i)=>(
                        <div key={r.brand} className="tab-row" style={{padding:"10px 16px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                            <span style={{width:8,height:8,borderRadius:"50%",background:BC[r.brand]||"var(--t4)",flexShrink:0}}/>
                            <div>
                              <div style={{fontSize:13,fontWeight:600}}>{i===0?"🏆 ":""}{r.brand}{isM(r.brand)&&<span className="mbg" style={{height:14,padding:"0 3px",marginLeft:4}}><img src={COSTCO_IMG} alt="C" style={{height:10}}/></span>}</div>
                              <div style={{fontSize:11,color:"var(--t4)",marginTop:1}}>{r.count} stations</div>
                            </div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"var(--mono)",fontSize:15,fontWeight:600,color:i===0?"var(--grn)":"var(--t1)"}}>{fmtP(r.avg)} ¢</div>
                            <div style={{fontSize:10,color:"var(--t4)",fontFamily:"var(--mono)"}}>{(r.avg*tank/100).toFixed(2)}$ /{tank}L</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {/* LIST VIEW */}
                {view==="list"&&(
                  <>
                    <div className="en d9" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7,padding:"0 2px"}}>
                      <span style={{fontSize:11,color:"var(--t3)"}}>{sort==="price"?"Triées par prix "+FL[fuel].toLowerCase():"Triées par distance"}</span>
                    </div>
                    {/* Favoris */}
                {favFilt.length>0&&(
                  <div className="en d9" style={{marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--red)" stroke="var(--red)" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                      <span style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>Favoris</span>
                      <span style={{fontSize:11,color:"var(--t4)"}}>({favFilt.length})</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {favFilt.map((s,i)=>{
                        const price=s[fuel],diff=price-ch,pc=pC(diff,sp);
                        const bl=s.brand!=="Aucun"&&s.brand!=="Autre"?s.brand:s.name;
                        const isE=sel===("fav-"+i);
                        return(
                          <div key={"fav-"+s.name+s.lat} className="stn" onClick={()=>setSel(isE?null:"fav-"+i)}
                            style={{borderColor:"rgba(239,68,68,.12)",background:"var(--card)"}}>
                            <div className="inner">
                              <div style={{width:32,height:32,borderRadius:8,flexShrink:0,background:pc.bg,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid "+pc.fg+"12"}}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="var(--red)" stroke="var(--red)" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:"flex",alignItems:"center",fontSize:13,fontWeight:600}}>
                                  <span style={{width:7,height:7,borderRadius:"50%",background:BC[s.brand]||"var(--t5)",flexShrink:0,marginRight:5}}/>
                                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bl}</span>
                                  {isM(s.brand)&&<span className="mbg"><img src={COSTCO_IMG} alt="C" style={{height:11}}/></span>}
                                </div>
                                <div style={{display:"flex",gap:6,marginTop:1,fontSize:11,color:"var(--t3)"}}>
                                  <span>{s.dist.toFixed(1)} km</span>
                                  <span style={{color:"var(--t4)"}}>{fmtDrive(s.dist)}</span>
                                  {diff===0?<span style={{color:"var(--grn)",fontWeight:600}}>Meilleur</span>:<span style={{color:"var(--red)",fontFamily:"var(--mono)"}}>+{diff.toFixed(1)}{"¢"}</span>}
                                </div>
                              </div>
                              <div style={{textAlign:"right",flexShrink:0}}>
                                <div style={{fontFamily:"var(--mono)",fontSize:19,fontWeight:600,color:"var(--t1)",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{fmtP(price)}</div>
                                <div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)",marginTop:1}}>{"¢"}/L</div>
                              </div>
                              <button className="share-btn" onClick={e=>{e.stopPropagation();toggleFav(s)}} style={{color:"var(--red)",borderColor:"rgba(239,68,68,.2)"}}>
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--red)" stroke="var(--red)" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                              </button>
                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--t4)" strokeWidth="2.5" strokeLinecap="round" style={{flexShrink:0,transition:"transform .2s",transform:isE?"rotate(180deg)":""}}>
                                <path d="M6 9l6 6 6-6"/>
                              </svg>
                            </div>
                            <div style={{maxHeight:isE?430:0,opacity:isE?1:0,overflow:"hidden",transition:"all .25s cubic-bezier(.22,1,.36,1)",padding:isE?"0 14px 12px":"0 14px 0"}}>
                              <div style={{height:1,background:"var(--border)",marginBottom:7}}/>
                              <div style={{fontSize:12,color:"var(--t2)",fontWeight:500,marginBottom:1}}>{s.name}</div>
                              <div style={{fontSize:11,color:"var(--t3)",marginBottom:5,lineHeight:1.4}}>{s.address}{s.postal&&", "+s.postal}{s.region&&" — "+s.region}</div>
                              {isE&&<MiniMap lat={s.lat} lon={s.lon} color={pc.fg} theme={theme}/>}
                              <div className="pills">
                                {["regular","super","diesel"].map(ft=>{const v=s[ft];return(<div key={ft} className={"pill"+(ft===fuel?" act":"")}>
                                  <div className="pk">{FL[ft]}</div><div className="pv" style={{color:v?ft===fuel?"var(--bl)":"var(--t2)":"var(--t4)"}}>{v?fmtP(v):"--"}</div>
                                </div>)})}
                              </div>
                              <a href={mu(s)} target="_blank" rel="noopener noreferrer" className="nbtn" onClick={e=>e.stopPropagation()} style={{marginTop:4}}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Itinéraire
                              </a>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {filt.length===0?(
                      <div style={{textAlign:"center",padding:"44px 20px",background:"var(--card)",borderRadius:14,border:"1px solid var(--border)"}}>
                        <div style={{animation:"float 2s ease-in-out infinite",marginBottom:12}}><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--t4)" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/></svg></div>
                        <div style={{fontSize:14,fontWeight:600}}>Aucune station</div>
                        <div style={{fontSize:12,color:"var(--t4)",marginTop:3}}>Augmentez le rayon ou changez de filtre.</div>
                      </div>
                    ):(
                      <>
                        <div style={{display:"flex",flexDirection:"column",gap:4}}>
                          {shown.map((s,i)=>{
                            const price=s[fuel],diff=price-ch,pc=pC(diff,sp);
                            const isE=sel===i,isB=i===0;
                            const bl=s.brand!=="Aucun"&&s.brand!=="Autre"?s.brand:s.name;
                            return(
                              <div key={s.name+s.lat+i} className={"stn en d"+Math.min(i+10,14)+(isB?" best":"")} onClick={()=>setSel(isE?null:i)}>
                                <div className="inner">
                                  <div style={{width:32,height:32,borderRadius:8,flexShrink:0,background:pc.bg,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid "+pc.fg+"12",transition:"all .2s"}}>
                                    <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:pc.fg,fontVariantNumeric:"tabular-nums"}}>{i+1}</span>
                                  </div>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{display:"flex",alignItems:"center",fontSize:13,fontWeight:600}}>
                                      <span style={{width:7,height:7,borderRadius:"50%",background:BC[s.brand]||"var(--t5)",flexShrink:0,marginRight:5}}/>
                                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bl}</span>
                                      {isM(s.brand)&&<span className="mbg"><img src={COSTCO_IMG} alt="Costco" style={{height:11}}/></span>}
                                    </div>
                                    <div style={{display:"flex",gap:6,marginTop:1,fontSize:11,color:"var(--t3)"}}>
                                      <span>{s.dist.toFixed(1)} km</span>
                                      <span style={{color:"var(--t4)"}}>{fmtDrive(s.dist)}</span>
                                      {diff===0?<span style={{color:"var(--grn)",fontWeight:600}}>Meilleur</span>:<span style={{color:"var(--red)",fontFamily:"var(--mono)"}}>+{diff.toFixed(1)}{"¢"}</span>}
                                    </div>
                                  </div>
                                  <button className="share-btn" onClick={e=>{e.stopPropagation();toggleFav(s)}} title={isFav(s)?"Retirer des favoris":"Ajouter aux favoris"} style={{color:isFav(s)?"var(--red)":"var(--t4)",borderColor:isFav(s)?"rgba(239,68,68,.2)":"var(--border)"}}>
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill={isFav(s)?"var(--red)":"none"} stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                                  </button>
                                  <button className="share-btn" onClick={(e)=>shareStn(s,e)} title="Partager">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                                  </button>
                                  <div style={{textAlign:"right",flexShrink:0}}>
                                    <div style={{fontFamily:"var(--mono)",fontSize:19,fontWeight:600,color:isB?"var(--grn)":"var(--t1)",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{fmtP(price)}</div>
                                    <div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)",marginTop:1}}>{(price*tank/100).toFixed(0)}$ /{tank}L</div>
                                  </div>
                                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--t4)" strokeWidth="2.5" strokeLinecap="round" style={{flexShrink:0,transition:"transform .2s",transform:isE?"rotate(180deg)":""}}>
                                    <path d="M6 9l6 6 6-6"/>
                                  </svg>
                                </div>
                                <div style={{maxHeight:isE?430:0,opacity:isE?1:0,overflow:"hidden",transition:"all .25s cubic-bezier(.22,1,.36,1)",padding:isE?"0 14px 12px":"0 14px 0"}}>
                                  <div style={{height:1,background:"var(--border)",marginBottom:7}}/>
                                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                                    <div style={{flex:1,minWidth:0}}>
                                      <div style={{fontSize:12,color:"var(--t2)",fontWeight:500,marginBottom:1}}>{s.name}</div>
                                      <div style={{fontSize:11,color:"var(--t3)",marginBottom:5,lineHeight:1.4}}>{s.address}{s.postal&&", "+s.postal}{s.region&&" — "+s.region}</div>
                                    </div>
                                    <button className="share-btn" onClick={(e)=>shareStn(s,e)} title="Partager" style={{marginLeft:8,flexShrink:0}}>
                                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                                    </button>
                                  </div>
                                  {isE&&<MiniMap lat={s.lat} lon={s.lon} color={isB?"#22C55E":pc.fg} theme={theme}/>}
                                  <div className="pills">
                                    {["regular","super","diesel"].map(ft=>{const v=s[ft];return(<div key={ft} className={"pill"+(ft===fuel?" act":"")}>
                                      <div className="pk">{FL[ft]}</div><div className="pv" style={{color:v?ft===fuel?"var(--bl)":"var(--t2)":"var(--t4)"}}>{v?fmtP(v):"--"}</div>
                                    </div>)})}
                                  </div>
                                  {isM(s.brand)&&(<div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px",borderRadius:6,margin:"4px 0",background:"var(--redg)",border:"1px solid rgba(239,68,68,.06)"}}>
                                    <span className="mbg" style={{height:13,padding:"0 3px"}}><img src={COSTCO_IMG} alt="C" style={{height:9}}/></span><span style={{fontSize:10,color:"var(--t3)"}}>Carte de membre Costco requise pour ce prix</span>
                                  </div>)}
                                  <a href={mu(s)} target="_blank" rel="noopener noreferrer" className="nbtn" onClick={e=>e.stopPropagation()} style={{marginTop:4}}>
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Itinéraire
                                  </a>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        {hasMore&&<button className="more-btn" onClick={()=>setVis(v=>v+MORE)}>Voir {Math.min(MORE,filt.length-vis)} stations de plus</button>}
                    <button onClick={async()=>{const text="EssenceQC - Compare les prix d'essence en temps réel partout au Québec. Gratuit, sans pub.\nhttps://essence-qc.com";if(navigator.share){try{await navigator.share({title:"EssenceQC",text,url:"https://essence-qc.com"});return}catch{}}try{await navigator.clipboard.writeText(text);showToast("Lien copié!")}catch{}}}
                      style={{marginTop:18,marginBottom:10,width:"100%",height:42,borderRadius:12,border:"1.5px solid rgba(59,130,246,.15)",background:"var(--blg)",color:"var(--bl)",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .15s",fontFamily:"var(--sans)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                      Partager EssenceQC
                    </button>
                      </>
                    )}
                  </>
                )}
              </div>
            )}
          </main>
          <footer style={{borderTop:"1px solid var(--border)",padding:"16px 0"}}>
            <div className="mx" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--t5)",flexWrap:"wrap",justifyContent:"center"}}>
                <div className="live" style={{width:4,height:4}}/>
                <span>Données en direct</span>
                {meta&&<span>· {meta.total_stations} stations</span>}
                <span style={{color:"var(--t4)"}}>· R=refresh 1/2/3=carburant</span>
              </div>
              <div style={{fontSize:11,color:"var(--t4)",lineHeight:1.6,textAlign:"center",maxWidth:400}}>
                Les données proviennent de la <a href="https://www.regie-energie.qc.ca" target="_blank" rel="noopener noreferrer" style={{color:"var(--bl)",textDecoration:"underline",textUnderlineOffset:2}}>Régie de l'énergie du Québec</a> via leur portail <a href="https://regieessencequebec.ca" target="_blank" rel="noopener noreferrer" style={{color:"var(--bl)",textDecoration:"underline",textUnderlineOffset:2}}>regieessencequebec.ca</a>. Conformément à la Loi 69, les détaillants doivent déclarer leurs prix en temps réel.
              </div>
            </div>
          </footer>
          {/* Scroll to top */}
          <button className={"top-btn"+(showTop?" show":"")} onClick={scrollTop} title="Retour en haut">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
        </div>
      )}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
